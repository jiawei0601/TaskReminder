<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週期任務提醒工具 | Task Reminder Tool</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Chart.js and Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header>
            <div class="header-main">
                <div>
                    <h1>週期任務提醒</h1>
                    <p class="subtitle">設定你的目標，按時進行，記錄成長。</p>
                </div>
                <div class="user-rank glass">
                    <span class="rank-icon">🏆</span>
                    <div class="rank-info">
                        <span class="rank-label">累積積分</span>
                        <span id="totalPoints" class="rank-value">0</span>
                    </div>
                </div>
            </div>
        </header>

        <section class="task-input-card glass">
            <h2><span class="icon">➕</span> 新增提醒任務</h2>
            <div class="input-group">
                <input type="text" id="taskName" placeholder="要做什麼工作？ (例如：喝水、伸展、讀書)">
                
                <div class="reminder-modes">
                    <label class="mode-btn active" data-mode="interval">
                        <input type="radio" name="remindMode" value="interval" checked> 固定頻率
                    </label>
                    <label class="mode-btn" data-mode="daily">
                        <input type="radio" name="remindMode" value="daily"> 每天固定
                    </label>
                    <label class="mode-btn" data-mode="weekly">
                        <input type="radio" name="remindMode" value="weekly"> 每週特定
                    </label>
                </div>

                <div id="intervalSettings" class="mode-settings">
                    <div class="input-with-label">
                        <label for="taskInterval">提醒週期 (分鐘)</label>
                        <input type="number" id="taskInterval" min="1" value="30">
                    </div>
                </div>

                <div id="dailySettings" class="mode-settings hidden">
                    <div class="input-with-label">
                        <label for="dailyTime">提醒時間</label>
                        <input type="time" id="dailyTime" value="09:00">
                    </div>
                </div>

                <div id="weeklySettings" class="mode-settings hidden">
                    <div class="weekday-selector">
                        <label><input type="checkbox" value="1"><span>一</span></label>
                        <label><input type="checkbox" value="2"><span>二</span></label>
                        <label><input type="checkbox" value="3"><span>三</span></label>
                        <label><input type="checkbox" value="4"><span>四</span></label>
                        <label><input type="checkbox" value="5"><span>五</span></label>
                        <label><input type="checkbox" value="6"><span>六</span></label>
                        <label><input type="checkbox" value="0"><span>日</span></label>
                    </div>
                    <div class="input-with-label">
                        <label for="weeklyTime">提醒時間</label>
                        <input type="time" id="weeklyTime" value="09:00">
                    </div>
                </div>

                <div class="advanced-settings glass-content">
                    <div class="followup-toggle">
                        <label class="checkbox-container">
                            <input type="checkbox" id="hasFollowup">
                            <span class="checkmark"></span>
                            啟用完成後的「後續問卷提醒」
                        </label>
                    </div>
                    <div id="followupDetail" class="hidden">
                        <div class="row">
                            <div class="input-with-label">
                                <label for="followupDelay">幾分鐘後填寫問卷？</label>
                                <input type="number" id="followupDelay" value="40" min="1">
                            </div>
                            <div class="input-with-label">
                                <label for="followupQuestion">問卷內容</label>
                                <input type="text" id="followupQuestion" placeholder="例如：你今天做了什麼運動？">
                            </div>
                        </div>
                    </div>
                    <div class="input-with-label" style="margin-top: 1rem; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 1rem;">
                        <label for="maxPoints">💰 此任務得分上限 (pt)</label>
                        <input type="number" id="maxPoints" value="100" min="1">
                    </div>
                </div>

                <button id="addTaskBtn" class="primary-btn shadow-glow">新增任務</button>
            </div>
        </section>

        <section class="stats-card glass">
            <h2><span class="icon">📊</span> 每週達成效率</h2>
            <div class="chart-container">
                <canvas id="statsChart"></canvas>
            </div>
        </section>

        <section class="dashboard">
            <div class="active-tasks">
                <h2><span class="icon">⌛</span> 進行中的任務</h2>
                <div id="taskList" class="task-grid">
                    <!-- Tasks will be injected here -->
                    <div class="empty-state">
                        <p>目前沒有設定中的任務，快來新增一個吧！</p>
                    </div>
                </div>
            </div>

            <div class="history-panel glass">
                <h2><span class="icon">📜</span> 完成記錄</h2>
                <div id="historyList" class="history-list">
                    <!-- History entries will be injected here -->
                </div>
                <button id="clearHistoryBtn" class="text-btn">清除所有記錄</button>
            </div>
        </section>
    </main>

    <!-- Reminder Modal -->
    <div id="reminderModal" class="modal-overlay hidden">
        <div class="modal glass-heavy slide-up">
            <div class="modal-content">
                <div class="alarm-icon">🔔</div>
                <h3 id="reminderTaskName">任務時間到！</h3>
                <p id="reminderMessage">是時候進行這項工作了。完成後請點擊下方按鈕進行記錄。</p>
                
                <div id="surveySection" class="hidden">
                    <div class="input-with-label">
                        <label id="surveyLabel" for="surveyAnswer">問卷回答</label>
                        <input type="text" id="surveyAnswer" placeholder="輸入紀錄內容...">
                    </div>
                    <div class="input-with-label" style="margin-top: 1rem;">
                        <label for="surveyScore">本次取得分數 (最高 <span id="maxScoreLabel">100</span> pt)</label>
                        <input type="number" id="surveyScore" value="0" min="0">
                    </div>
                </div>

                <div class="modal-actions">
                    <button id="markCompleteBtn" class="primary-btn">完成並記錄 (+10pt)</button>
                    <button id="surveySubmitBtn" class="primary-btn hidden">提交紀錄 (+15pt)</button>
                    <button id="snoozeBtn" class="secondary-btn">稍後提醒 (5分)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
